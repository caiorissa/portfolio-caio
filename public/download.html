<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Download</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050505;
        color: #a1a1aa;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 1.5rem;
        text-align: center;
      }
      h1 {
        color: #fff;
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      p {
        max-width: 24rem;
        line-height: 1.5;
        margin-bottom: 1.5rem;
      }
      .buttons {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        width: min(100%, 16rem);
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: #fff;
        font: inherit;
        font-size: 0.95rem;
        padding: 0.85rem 1rem;
        border-radius: 10px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
      }
      button:hover {
        border-color: #5227ff;
        background: rgba(82, 39, 255, 0.12);
      }
      button span {
        display: block;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.4);
        margin-top: 0.25rem;
      }
      #status {
        margin-top: 1.25rem;
        min-height: 1.5rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Setup pós-formatação</h1>
      <p>Escolha o sistema. O download começa na hora.</p>

      <div class="buttons">
        <button type="button" data-file="/downloads/setup-mac.sh">
          macOS
          <span>setup-mac.sh</span>
        </button>
        <button type="button" data-file="/downloads/setup-windows.zip">
          Windows
          <span>setup-windows.zip</span>
        </button>
      </div>

      <p id="status"></p>
    </div>

    <script>
      const status = document.getElementById('status');

      function download(file) {
        const filename = file.split('/').pop();
        status.textContent = 'Iniciando download…';

        fetch(file)
          .then((res) => {
            if (!res.ok) throw new Error('not found');
            return res.blob();
          })
          .then((blob) => {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
            status.textContent = 'Download iniciado. Pode fechar esta aba.';
          })
          .catch(() => {
            status.textContent = 'Arquivo não encontrado no servidor.';
          });
      }

      document.querySelectorAll('button[data-file]').forEach((button) => {
        button.addEventListener('click', () => download(button.dataset.file));
      });

      const params = new URLSearchParams(window.location.search);
      const os = params.get('os');
      if (os === 'mac') download('/downloads/setup-mac.sh');
      if (os === 'windows') download('/downloads/setup-windows.zip');
    </script>
  </body>
</html>
